services:
  immersive-proxy:
    build: .
    image: immersive-proxy:latest
    container_name: immersive-proxy
    # 保活:崩溃 / 宿主机重启自动拉起(手动 down/stop 除外)
    restart: unless-stopped

    # 关键:直接挂载 .env 进容器,由容器内 python-dotenv 读取。
    # 不用 env_file —— compose 的 env_file 会把 Cookie 里的 $xxx 当变量展开,破坏 Cookie。
    volumes:
      - ./.env:/app/.env:ro

    # 覆盖监听地址:容器内必须监听 0.0.0.0:8000(环境变量优先级高于 .env)
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"

    # 宿主机端口:左边按需改(如 8965),右边固定容器内 8000
    ports:
      - "8000:8000"
